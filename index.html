<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat con San Martín</title>

<style>

body{
font-family: Arial;
background:#e5ddd5;
margin:0;
display:flex;
justify-content:center;
height:100vh;
}

.chat-container{
width:420px;
background:white;
display:flex;
flex-direction:column;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.header{
background:#075E54;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#ccc;
}

.chat{
flex:1;
padding:15px;
overflow-y:auto;
background:#ece5dd;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:10px;
margin-bottom:10px;
font-size:14px;
}

.user{
background:#dcf8c6;
margin-left:auto;
}

.bot{
background:white;
}

.input-area{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
border:none;
padding:14px;
font-size:14px;
outline:none;
}

button{
background:#25D366;
border:none;
color:white;
padding:0 20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
<div class="avatar"></div>
<div>
<b>General San Martín</b><br>
<small>en línea</small>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Escribí un mensaje..." />
<button onclick="send()">Enviar</button>
</div>

</div>

<script>

const webhook = "https://n8n.mtrpymes.com.ar/webhook/144f26ae-b3b7-4d5f-b4f9-5b9c4d8cdbfe"

let history = JSON.parse(localStorage.getItem("sanmartin_chat") || "[]")

const chat = document.getElementById("chat")

function render(){

chat.innerHTML=""

history.forEach(m => {

const div = document.createElement("div")

div.className="msg "+m.role
div.innerText = m.text

chat.appendChild(div)

})

chat.scrollTop = chat.scrollHeight

}

render()

async function send(){

const input = document.getElementById("msg")
const text = input.value.trim()

if(!text) return

history.push({role:"user",text})

render()

input.value=""

const res = await fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
session:"webuser"
})
})

const data = await res.json()

history.push({
role:"bot",
text:data.reply
})

localStorage.setItem("sanmartin_chat",JSON.stringify(history))

render()

}

</script>

</body>
</html>
